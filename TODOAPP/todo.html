<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TO DO APP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body class="bg-secondary">

    <nav class="navbar navbar-dark bg-dark py-4 navbar-expand-lg">
        <div class="container">
            <a href="" class="navbar-brand py-3">TO-DO LIST</a>
        </div>

    </nav>
    <div class="container-fluid my-5 ">
        <div class="row py-4 ">
          <!-- <div class="col-2"></div>-->
            <div class="col-12  ">
                <div class="row justify-content-center">
                    <div class="col-6">
                         <input type="text" placeholder="ADD TASK"  class="w-100 py-3 px-3 rounded text-dark border-0 "  id="inputbox">
                    </div>
                    <div class="col-4 mx-1">
                         <button class="btn btn-primary py-3 px-3 me-2 w-50" onclick="addtask()">ADD</button>
                    </div>
                </div>
               
               
                <!--<ul  id="list" class=""></ul>-->
                <div class="row my-3" id="list"></div>

            </div>
          <!-- <div class="col-2"></div>-->
        </div>
    </div>
      <!-- `<div  class="col-8 bg-dark text-light my-2">
                               <h4 class="py-3 px-3">${task}<h4>
                            </div>
                            <div class="col-3 my-2 mx-1">
                                <button class="btn btn-primary w-100 " onclick="deletetask(${index})">
                                        Delete
                                </button>
                            </div>
        `-->
</body>
<script>
    let tasks=[]
    function addtask()
    {   
        
        let input = document.getElementById("inputbox")
        let inputvalue=input.value
        if(input.value=="")
    {
        alert("Enter Task 1st")
    }
    else{
        tasks.push(inputvalue)
        input.value=""
        displaytask()
    }
    }
    function displaytask()
    {
        list=document.getElementById("list")
        list.innerHTML="";
        tasks.forEach((task,index)=>
    {
        list.innerHTML+=`
                            <div class="col-3 my-3">
                                <div class="card ">
                                    <div class="card-header bg-dark text-light">
                                       <h4 class="py-3 px-3"> ${task}</h4>
                                    </div>  
                                    
                                    <button class=" card-body btn  btn-primary w-100 h-100 py-3 px-3" onclick="deletetask(${index})">Delete</button>

                                </div>

                            </div>
                        `
        
    })
    }

    function deletetask(index)
    {
        tasks.splice(index,1)
        displaytask()
    }

</script>
</html>
