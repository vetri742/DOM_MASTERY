<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

<body class="bg-dark text-light ">

    <div class="container my-5 text-center">
        <h2>FORM-VALIDATION</h2>
    </div>
    <div class="container my-5 ">
        <div class="row ">
            <div class="col-3"></div>
            <div class="col-6 text-center">
                <form action="" id="form">
                    <input type="text" placeholder="Enter Name" id="username" class="w-100 py-3 px-3 my-3">
                    <p id="nameerror"></p>
                    <input type="email" placeholder="Email" id="email" class="w-100 py-3 px-3 my-3">
                    <p id="emailerror"></p>
                    <button class="btn btn-danger w-50 py-3 px-3 rounded-pill ">SUBMIT</button>
                </form>
            </div>
            <div class="col-6"></div>
        </div>
    </div>
    
</body>
<script src="./form.js"></script>
